<html>
  <head>
    <title>earth</title>
    <style type="text/css">
      html, body, #basicMap {
          width: 100%;
          height: 100%;
          margin: 0;
      }
    </style>
    <script src="../OpenLayers/OpenLayers.js"></script>
    <script>
      function init() {
        map = new OpenLayers.Map("basicMap");
        var newLayer = new OpenLayers.Layer.OSM("New Layer", "Localhost/EABA/osm/${z}/${x}/${y}.jpg", {numZoomLevels: 4});
		map.addLayer(newLayer);
		map.setCenter(new OpenLayers.LonLat(0.00000000000000000,-0.00000000000000711) // Center of the map
          .transform(
            new OpenLayers.Projection("EPSG:4326"), // transform from WGS 1984
            new OpenLayers.Projection("EPSG:900913") // to Spherical Mercator Projection
          ), 1 // Zoom level
        );
      }
    </script>
  </head>
  <body onload="init();">
    <div id="basicMap"></div>
  </body>
</html>
